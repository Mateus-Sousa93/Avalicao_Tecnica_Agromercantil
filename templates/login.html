<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login | Agromercantil Analytics</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-primary-fixed": "#0c2000",
                        "on-secondary-container": "#476f00",
                        "surface-bright": "#fcf9f8",
                        "secondary": "#436900",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#44483e",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#1b1c1c",
                        "outline": "#74796c",
                        "inverse-surface": "#303030",
                        "surface-tint": "#4a6632",
                        "surface": "#fcf9f8",
                        "on-secondary-fixed": "#112000",
                        "surface-variant": "#e4e2e1",
                        "secondary-container": "#b9f467",
                        "surface-container": "#f0eded",
                        "primary-container": "#253f0f",
                        "inverse-primary": "#b0d191",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-tertiary-container": "#d99425",
                        "tertiary": "#331f00",
                        "on-tertiary-fixed-variant": "#633f00",
                        "on-tertiary": "#ffffff",
                        "background": "#fcf9f8",
                        "surface-container-highest": "#e4e2e1",
                        "surface-dim": "#dcd9d9",
                        "primary-fixed-dim": "#b0d191",
                        "surface-container-low": "#f6f3f2",
                        "on-primary": "#ffffff",
                        "secondary-fixed-dim": "#9fd74e",
                        "on-primary-container": "#8cab6f",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-secondary-fixed-variant": "#314f00",
                        "primary": "#112800",
                        "surface-container-high": "#eae7e7",
                        "outline-variant": "#c4c8ba",
                        "on-primary-fixed-variant": "#334e1d",
                        "on-surface": "#1b1c1c",
                        "tertiary-fixed": "#ffddb4",
                        "secondary-fixed": "#b9f467",
                        "tertiary-fixed-dim": "#ffb954",
                        "inverse-on-surface": "#f3f0ef",
                        "tertiary-container": "#503200",
                        "primary-fixed": "#cbedab",
                        "accent-orange": "#F58220"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "brand": ["Montserrat"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-hero-gradient {
            background: linear-gradient(135deg, #112800 0%, #253f0f 100%);
        }
        .tonal-shadow {
            box-shadow: 0 40px 80px -20px rgba(27, 28, 28, 0.06);
        }
        .input-underline {
            border: none;
            border-bottom: 2px solid rgba(196, 200, 186, 0.5);
            background: transparent;
            transition: border-color 0.2s;
        }
        .input-underline:focus {
            outline: none;
            border-bottom-color: #436900;
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface overflow-x-hidden">
    <main class="h-screen w-screen flex flex-col md:flex-row overflow-hidden">
        
        <!-- Left Side: Hero Branding -->
        <section class="hidden md:flex md:w-1/2 lg:w-3/5 relative overflow-hidden">
            <!-- Visual Asset - Hero Background -->
            <div class="absolute inset-0">
                <img alt="Commodities Trading" class="w-full h-full object-cover" src="{{ url_for('static', filename='images/hero_bg.png') }}"/>
            </div>
        </section>
        
        <!-- Right Side: Login Form -->
        <section class="flex-1 flex flex-col justify-center items-center p-6 md:p-8 lg:p-12 bg-surface-container-low relative overflow-hidden">
            <div class="w-full max-w-md">
                
                <!-- Mobile Header (Hidden on Desktop) -->
                <div class="md:hidden flex items-center gap-3 mb-12">
                    <img alt="Agromercantil" class="h-8 w-auto" src="{{ url_for('static', filename='images/logo.png') }}"/>
                </div>
                
                <!-- Form Heading -->
                <header class="mb-4 relative">
                    <div class="absolute -left-6 top-1/2 -translate-y-1/2 w-1.5 h-10 bg-tertiary-fixed hidden md:block"></div>
                    <h2 class="font-brand font-bold text-2xl text-primary mb-1">Portal de Operações</h2>
                    <p class="text-on-surface-variant font-body text-sm">Gestão de Commodities Agrícolas</p>
                </header>
                
                <!-- Login Card -->
                <div class="bg-surface-container-lowest p-5 md:p-6 rounded-2xl tonal-shadow border border-outline-variant/10">
                    
                    {% if error %}
                    <div class="mb-6 p-4 bg-error-container/50 border border-error rounded-xl flex items-center gap-3">
                        <span class="material-symbols-outlined text-error">error</span>
                        <span class="text-error text-sm font-medium">{{ error }}</span>
                    </div>
                    {% endif %}
                    
                    <form method="POST" action="{{ url_for('login') }}" class="space-y-4">
                        <!-- Username Field -->
                        <div class="space-y-1">
                            <label class="block text-xs font-bold font-label uppercase tracking-widest text-on-surface-variant" for="username">Usuário</label>
                            <div class="relative group">
                                <span class="material-symbols-outlined absolute left-0 bottom-2 text-outline group-focus-within:text-secondary transition-colors text-base">person</span>
                                <input 
                                    class="w-full pl-6 py-2 bg-transparent border-0 border-b-2 border-outline-variant/30 focus:border-secondary focus:ring-0 transition-all text-on-surface placeholder:text-outline/50 font-body input-underline text-sm" 
                                    id="username" 
                                    name="username" 
                                    placeholder="Digite seu usuário" 
                                    type="text"
                                    required
                                    autofocus
                                />
                            </div>
                        </div>
                        
                        <!-- Password Field -->
                        <div class="space-y-1">
                            <div class="flex justify-between items-center">
                                <label class="block text-xs font-bold font-label uppercase tracking-widest text-on-surface-variant" for="password">Senha</label>
                            </div>
                            <div class="relative group">
                                <span class="material-symbols-outlined absolute left-0 bottom-2 text-outline group-focus-within:text-secondary transition-colors text-base">lock</span>
                                <input 
                                    class="w-full pl-6 py-2 bg-transparent border-0 border-b-2 border-outline-variant/30 focus:border-secondary focus:ring-0 transition-all text-on-surface placeholder:text-outline/50 font-body input-underline text-sm" 
                                    id="password" 
                                    name="password" 
                                    placeholder="••••••••" 
                                    type="password"
                                    required
                                />
                            </div>
                        </div>
                        
                        <!-- Primary Action -->
                        <button class="w-full py-3 bg-accent-orange hover:bg-[#e67610] text-white font-brand font-bold rounded-xl transition-all shadow-lg shadow-orange-500/20 active:scale-[0.98] flex items-center justify-center gap-2 text-sm" type="submit">
                            <span>Entrar</span>
                            <span class="material-symbols-outlined text-sm">arrow_forward</span>
                        </button>
                    </form>
                    
                </div>
                
            </div>
        </section>
    </main>
</body>
</html>
